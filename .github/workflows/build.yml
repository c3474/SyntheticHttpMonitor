name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SyntheticHttpMonitor.sln

      - name: Build
        run: dotnet build SyntheticHttpMonitor.sln -c Release --no-restore

      - name: Check for vulnerable packages
        run: dotnet list SyntheticHttpMonitor.sln package --vulnerable --include-transitive
